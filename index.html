<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Macro Rides - Click-to-Route EV Simulator</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #map {
        height: 100vh;
        width: 100%;
      }
      .control-panel {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.98);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        width: 330px;
      }
      h3 {
        margin: 0 0 12px 0;
        color: #1e293b;
        font-size: 18px;
        border-bottom: 2px solid #3b82f6;
        padding-bottom: 5px;
      }
      .setting-group {
        margin-bottom: 12px;
      }
      label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        color: #475569;
        margin-bottom: 4px;
        text-transform: uppercase;
      }
      select,
      input[type="range"],
      input[type="text"] {
        width: 100%;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #cbd5e1;
        box-sizing: border-box;
      }
      .search-btn {
        width: 100%;
        margin-top: 6px;
        background: #3b82f6;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .search-btn:hover {
        background: #2563eb;
      }
      .reset-btn {
        width: 100%;
        margin-top: 6px;
        background: #ef4444;
        color: white;
        border: none;
        padding: 6px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      .reset-btn:hover {
        background: #dc2626;
      }
      .stats {
        background: #f8fafc;
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        font-size: 13px;
        border-left: 4px solid #10b981;
      }
      .instructions {
        background: #eff6ff;
        padding: 8px;
        border-radius: 6px;
        font-size: 12px;
        color: #1e40af;
        border: 1px solid #bfdbfe;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <div class="control-panel">
      <h3>Macro Rides Engine</h3>

      <div class="instructions">
        📍 <strong>How to Route:</strong> Type a city to teleport, then
        <strong>click multiple points on the map</strong> to draw a custom
        driver route!
      </div>

      <div class="setting-group">
        <label for="location-input">1. Jump to Location:</label>
        <input
          type="text"
          id="location-input"
          placeholder="e.g., IIT Kanpur, New Delhi"
          value="IIT Kanpur"
        />
        <button class="search-btn" onclick="geocodeAddress()">
          Teleport Engine
        </button>
      </div>

      <div class="setting-group">
        <label
          >2. Pickup Density: <span id="density-val">30</span> locations</label
        >
        <input
          type="range"
          id="density-slider"
          min="5"
          max="100"
          step="5"
          value="30"
          onchange="regeneratePickupsOnly()"
        />
      </div>

      <div class="setting-group">
        <label>3. Corridor Radius: <span id="radius-val">350</span>m</label>
        <input
          type="range"
          id="radius-slider"
          min="100"
          max="1000"
          step="50"
          value="350"
          oninput="updateParams()"
        />
      </div>

      <div class="setting-group">
        <label for="h3-res">4. H3 Resolution Hierarchy:</label>
        <select id="h3-res" onchange="updateParams()">
          <option value="8">Resolution 8 (~700m bounds)</option>
          <option value="9" selected>Resolution 9 (~100m localized)</option>
          <option value="10">Resolution 10 (~40m ultra precision)</option>
        </select>
        <button class="reset-btn" onclick="clearCustomRoute()">
          Clear Custom Route
        </button>
      </div>

      <div class="stats">
        <div>
          <strong>Active Corridor Pickups:</strong>
          <span id="pickup-count" style="color: #ef4444; font-weight: bold"
            >0</span
          >
        </div>
        <div>
          <strong>H3 Cells Active in Cache:</strong>
          <span id="cell-count" style="color: #3b82f6; font-weight: bold"
            >0</span
          >
        </div>
      </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>

    <script>
      // Set baseline spatial states
      let currentCenterLat = 26.5123;
      let currentCenterLon = 80.2329;
      let bufferRadius = 350;
      let h3Resolution = 9;

      // Simulation engine memory frames
      let userClickedCoords = [];
      let pathCoordinates = [];
      let mockPickups = [];
      let step = 0;
      let simInterval = null;

      // Map Canvas Setup
      const map = L.map("map").setView(
        [currentCenterLat, currentCenterLon],
        14,
      );
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      ).addTo(map);

      // Graphics Layer Bundles
      let driverMarker = null,
        bufferLayer = null,
        routeLayer = null;
      let clickMarkersGroup = L.layerGroup().addTo(map);
      let pickupLayerGroup = L.layerGroup().addTo(map);

      // 1. Listen for User Clicks to Draw Route
      map.on("click", function (e) {
        const lat = e.latlng.lat;
        const lon = e.latlng.lng;

        // Save coordinate pair in Turf format [Lng, Lat]
        userClickedCoords.push([lon, lat]);

        // Add visual helper pin on the map where user clicked
        L.circleMarker(e.latlng, {
          radius: 5,
          color: "#3b82f6",
          fillColor: "#ffffff",
          fillOpacity: 1,
          weight: 2,
        }).addTo(clickMarkersGroup);

        // Recompute route trajectory if we have at least 2 points
        if (userClickedCoords.length >= 2) {
          buildRouteFromCoordinates(userClickedCoords);
        }
      });

      function buildRouteFromCoordinates(coordsArray) {
        if (routeLayer) map.removeLayer(routeLayer);
        step = 0;

        const routeLine = turf.lineString(coordsArray);
        routeLayer = L.geoJSON(routeLine, {
          color: "#475569",
          weight: 4,
          dashArray: "5, 8",
        }).addTo(map);

        // Smooth interpolation parsing split engine
        const totalSteps = 200;
        const totalLength = turf.length(routeLine);

        if (totalLength > 0) {
          const lineChunks = turf.lineChunk(
            routeLine,
            totalLength / totalSteps,
            { units: "kilometers" },
          );
          pathCoordinates = lineChunks.features.map(
            (f) => f.geometry.coordinates[0],
          );
        }
      }

      function clearCustomRoute() {
        userClickedCoords = [];
        pathCoordinates = [];
        step = 0;
        if (routeLayer) map.removeLayer(routeLayer);
        if (driverMarker) map.removeLayer(driverMarker);
        if (bufferLayer) map.removeLayer(bufferLayer);
        clickMarkersGroup.clearLayers();
        pickupLayerGroup.clearLayers();
        generateDefaultRoute(); // Fallback to center-point route framework
      }

      // 2. Global Text Input Geocoder API
      async function geocodeAddress() {
        const query = document.getElementById("location-input").value;
        if (!query) return;

        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`,
          );
          const data = await response.json();

          if (data && data.length > 0) {
            currentCenterLat = parseFloat(data[0].lat);
            currentCenterLon = parseFloat(data[0].lon);

            map.setView([currentCenterLat, currentCenterLon], 14);
            clearCustomRoute();
          } else {
            alert("Location tracking target not identified.");
          }
        } catch (error) {
          console.error("Geocoding connection exception:", error);
        }
      }

      // 3. Fallback / Default Route Framework Generator
      function generateDefaultRoute() {
        const defaultPath = [
          [currentCenterLon - 0.01, currentCenterLat + 0.005],
          [currentCenterLon - 0.002, currentCenterLat + 0.002],
          [currentCenterLon + 0.002, currentCenterLat - 0.002],
          [currentCenterLon + 0.01, currentCenterLat - 0.005],
        ];
        buildRouteFromCoordinates(defaultPath);
        regeneratePickupsOnly();
      }

      function regeneratePickupsOnly() {
        const desiredCount = parseInt(
          document.getElementById("density-slider").value,
        );
        document.getElementById("density-val").innerText = desiredCount;
        mockPickups = [];

        for (let i = 0; i < desiredCount; i++) {
          const latOffset = (Math.random() - 0.5) * 0.018;
          const lonOffset = (Math.random() - 0.5) * 0.026;
          const pLat = currentCenterLat + latOffset;
          const pLon = currentCenterLon + lonOffset;

          mockPickups.push({
            coords: [pLat, pLon],
            name: `Terminal Node Pickup #${i + 1}`,
          });
        }
      }

      // 4. Reactive Computational Core Cycle Loop
      function updateSimulation() {
        if (!pathCoordinates.length) return;
        if (step >= pathCoordinates.length) step = 0;

        const currentLngLat = pathCoordinates[step];
        const currentLatLon = [currentLngLat[1], currentLngLat[0]];

        if (driverMarker) map.removeLayer(driverMarker);
        if (bufferLayer) map.removeLayer(bufferLayer);
        pickupLayerGroup.clearLayers();

        // Render Driver
        driverMarker = L.circleMarker(currentLatLon, {
          radius: 8,
          color: "#10b981",
          fillColor: "#10b981",
          fillOpacity: 1,
        }).addTo(map);

        // Compute precise buffer polygon mapping area
        const pointFeature = turf.point(currentLngLat);
        const bufferGeoJSON = turf.buffer(pointFeature, bufferRadius, {
          units: "meters",
        });
        bufferLayer = L.geoJSON(bufferGeoJSON, {
          color: "#3b82f6",
          fillColor: "#3b82f6",
          fillOpacity: 0.12,
          weight: 1,
        }).addTo(map);

        // Convert polygon edge loops into H3 Matrix Cell hashes indices mapping array list
        const polygonCoords = bufferGeoJSON.geometry.coordinates[0].map(
          (coord) => [coord[1], coord[0]],
        );
        let bufferedH3Cells = [];
        try {
          bufferedH3Cells = h3.polygonToCells(polygonCoords, h3Resolution);
        } catch (e) {}

        const bufferSet = new Set(bufferedH3Cells);
        document.getElementById("cell-count").innerText =
          bufferedH3Cells.length;

        let eligibleCount = 0;
        mockPickups.forEach((p) => {
          const h3Index = h3.latLngToCell(
            p.coords[0],
            p.coords[1],
            h3Resolution,
          );
          const isEligible = bufferSet.has(h3Index);
          if (isEligible) eligibleCount++;

          L.circleMarker(p.coords, {
            radius: isEligible ? 7 : 4.5,
            color: isEligible ? "#ef4444" : "#94a3b8",
            fillColor: isEligible ? "#ef4444" : "#94a3b8",
            fillOpacity: isEligible ? 0.95 : 0.35,
            weight: 1,
          })
            .bindPopup(`<b>${p.name}</b><br>H3 Grid Node ID: ${h3Index}`)
            .addTo(pickupLayerGroup);
        });

        document.getElementById("pickup-count").innerText = eligibleCount;
        step++;
      }

      function updateParams() {
        bufferRadius = parseInt(document.getElementById("radius-slider").value);
        h3Resolution = parseInt(document.getElementById("h3-res").value);
        document.getElementById("radius-val").innerText = bufferRadius;
      }

      // Initialize application thread architecture loops
      generateDefaultRoute();
      if (simInterval) clearInterval(simInterval);
      simInterval = setInterval(updateSimulation, 250);
    </script>
  </body>
</html>
